{% import "_nationality.html" as nat %}
<!-- Tab 2: Selección de usuario + tarjetas -->
<div class="grid grid-cols-1 lg:grid-cols-5 gap-5 min-h-[600px]"
     x-data="{ selectedUserId: null, showAdd: false, showCompanyModal: false }">

    <!-- Left: search + add user + user list -->
    <div class="lg:col-span-2 bg-white border border-sky-100 rounded-2xl flex flex-col overflow-hidden shadow-sm">

        <!-- Search row: search (half) + "Agregar usuario" button -->
        <div class="p-4 border-b border-sky-100 flex items-center gap-2">
            <input type="text"
                   name="q"
                   placeholder="Buscar usuario..."
                   autocomplete="off"
                   hx-get="/ui/users/search"
                   hx-trigger="input changed delay:300ms, keyup[key=='Enter']"
                   hx-target="#user-list-body"
                   hx-swap="innerHTML"
                   class="flex-1 bg-sky-50 border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400 focus:border-transparent">
            <button type="button" @click="showAdd = !showAdd"
                    class="inline-flex items-center gap-1.5 px-3 py-2 bg-sky-500 hover:bg-sky-600 text-white text-xs font-semibold rounded-xl transition-colors whitespace-nowrap shrink-0">
                <span class="text-base leading-none">+</span> Agregar usuario
            </button>
        </div>

        <!-- Add user form — appears below the search, pushing the list down -->
        <div x-show="showAdd" x-cloak class="p-4 border-b border-sky-100 bg-sky-50/40">
            <form hx-post="/ui/users/create"
                  hx-swap="none"
                  hx-on::after-request="if(event.detail.successful){ this.reset(); showAdd = false; htmx.ajax('GET','/ui/users/search',{target:'#user-list-body',swap:'innerHTML'}) }"
                  class="space-y-2">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" name="first_name" required placeholder="Nombre" title="Nombre"
                           class="bg-white border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400">
                    <input type="text" name="last_name" required placeholder="Apellido" title="Apellido"
                           class="bg-white border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400">
                </div>
                <div class="grid grid-cols-[6.5rem_1fr] gap-2">
                    <select name="document_type" title="Tipo de documento"
                            class="bg-white border border-sky-200 rounded-xl px-2 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-400">
                        <option value="DNI">DNI</option>
                        <option value="Pasaporte">Pasaporte</option>
                        <option value="CI">CI</option>
                        <option value="Otro">Otro</option>
                    </select>
                    <input type="text" name="document_number" placeholder="N° de documento" title="N° de documento"
                           class="bg-white border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select name="nationality" title="Nacionalidad"
                            class="bg-white border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-400">
                        {{ nat.options("AR") }}
                    </select>
                    <div class="flex gap-1">
                        <select id="company-select-add" name="company_id" required title="Empresa"
                                class="flex-1 min-w-0 bg-white border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-700 focus:outline-none focus:ring-2 focus:ring-sky-400">
                            <option value="" disabled selected>Empresa…</option>
                            {% for c in companies %}
                            <option value="{{ c.id }}">{{ c.name }}</option>
                            {% endfor %}
                        </select>
                        <button type="button"
                                @click="showCompanyModal = true; $nextTick(() => $refs.companyName && $refs.companyName.focus())"
                                title="Agregar empresa"
                                class="shrink-0 px-3 py-2 bg-sky-100 hover:bg-sky-200 text-sky-700 text-xs font-semibold rounded-xl transition-colors">
                            Agregar
                        </button>
                    </div>
                </div>
                <input type="email" name="email" placeholder="Email (opcional)" title="Email"
                       class="w-full bg-white border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400">
                <div class="flex items-center gap-2 pt-0.5">
                    <button type="submit"
                            class="inline-flex items-center gap-1.5 px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-semibold rounded-xl transition-colors">
                        <span class="text-base leading-none">+</span> Agregar usuario
                    </button>
                    <button type="button" @click="showAdd = false"
                            class="px-3 py-2 text-slate-400 hover:text-slate-600 text-sm transition-colors">
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <div id="user-list-body"
             class="overflow-y-auto flex-1 divide-y divide-sky-50"
             hx-get="/ui/users/search"
             hx-trigger="load"
             hx-swap="innerHTML">
        </div>
    </div>

    <!-- Right: user detail panel -->
    <div class="lg:col-span-3 bg-white border border-sky-100 rounded-2xl overflow-hidden shadow-sm">
        <div id="user-detail-panel" class="h-full">
            <div class="flex items-center justify-center h-full py-20 text-slate-400 text-sm">
                Seleccioná un usuario para ver sus tarjetas
            </div>
        </div>
    </div>

    <!-- Modal: agregar empresa -->
    <div x-show="showCompanyModal" x-cloak
         @keydown.escape.window="showCompanyModal = false"
         @close-company-modal.window="showCompanyModal = false"
         class="fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/40" @click="showCompanyModal = false"></div>
        <div class="relative bg-white rounded-2xl shadow-xl w-full max-w-md p-5">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-base font-bold text-slate-800">Nueva empresa</h3>
                <button type="button" @click="showCompanyModal = false"
                        class="text-slate-400 hover:text-slate-600 text-lg leading-none">✕</button>
            </div>
            <form hx-post="/ui/companies/create-option"
                  hx-target="#company-select-add"
                  hx-swap="innerHTML"
                  hx-on::after-request="if(event.detail.successful){ this.reset(); window.dispatchEvent(new CustomEvent('close-company-modal')) }"
                  class="space-y-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1 uppercase tracking-wide">Nombre de la empresa</label>
                    <input type="text" name="name" required autocomplete="off" x-ref="companyName"
                           placeholder="Nombre de la empresa"
                           class="w-full bg-white border border-sky-200 rounded-xl px-3 py-2 text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-sky-400">
                </div>
                <div class="flex items-center justify-end gap-2 pt-1">
                    <button type="button" @click="showCompanyModal = false"
                            class="px-3 py-2 text-slate-500 hover:text-slate-700 text-sm transition-colors">
                        Cancelar
                    </button>
                    <button type="submit"
                            class="px-4 py-2 bg-sky-500 hover:bg-sky-600 text-white text-sm font-semibold rounded-xl transition-colors">
                        Guardar empresa
                    </button>
                </div>
            </form>
        </div>
    </div>

</div>
