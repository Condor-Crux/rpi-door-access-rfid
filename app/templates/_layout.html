<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Parador Km1151{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='/dist/app.css') }}?v={{ asset_version }}">
    <script src="{{ url_for('static', path='/vendor/htmx.min.js') }}"></script>
    <script src="{{ url_for('static', path='/vendor/htmx-ext-sse.js') }}"></script>
    <script defer src="{{ url_for('static', path='/vendor/alpinejs.min.js') }}"></script>
</head>
<body class="min-h-screen bg-sky-50 text-slate-800 antialiased"
      x-data="{ toasts: [],
                pushToast(msg, kind) {
                    const id = Date.now() + Math.random();
                    this.toasts.push({ id, msg, kind: kind || 'info' });
                    setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 4000);
                } }"
      @account-created.window="pushToast('Tarjeta creada', 'success')"
      @htmx:response-error.window="
          if (event.detail.xhr && event.detail.xhr.status === 401) {
              window.location.href = '/login';
          } else {
              pushToast('Error en la solicitud', 'error');
          }
      ">

{% block body %}{% endblock %}

<div class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
    <template x-for="t in toasts" :key="t.id">
        <div class="pointer-events-auto rounded-xl px-4 py-3 shadow-lg text-sm font-medium"
             :class="{
                 'bg-emerald-500 text-white': t.kind === 'success',
                 'bg-rose-500 text-white':    t.kind === 'error',
                 'bg-sky-700 text-white border border-sky-600': t.kind === 'info'
             }"
             x-text="t.msg"
             x-transition.opacity></div>
    </template>
</div>

<script>
    // Click-to-expand for audit log rows. Event delegation so it also covers
    // rows injected live over SSE or via "load more".
    document.addEventListener('click', function (ev) {
        var row = ev.target.closest('[data-log-row]');
        if (!row) return;
        var detail = row.nextElementSibling;
        if (!detail || !detail.hasAttribute('data-log-detail')) return;
        detail.hidden = !detail.hidden;
        var caret = row.querySelector('[data-log-caret]');
        if (caret) caret.textContent = detail.hidden ? '▸' : '▾';
    });
</script>

</body>
</html>
